name: Docker Image CI

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build API image
        run: |
          docker build ./blobpulse-api \
            -t ghcr.io/${{ github.repository_owner }}/blobpulse-api:latest

      - name: Build UI image
        run: |
          docker build ./blobpulse-ui \
            -t ghcr.io/${{ github.repository_owner }}/blobpulse-ui:latest

      - name: Push API image
        run: docker push ghcr.io/${{ github.repository_owner }}/blobpulse-api:latest

      - name: Push UI image
        run: docker push ghcr.io/${{ github.repository_owner }}/blobpulse-ui:latest
