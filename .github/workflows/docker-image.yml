name: Build and Push Blobpulse Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build . \
            -t ghcr.io/${{ github.repository_owner }}/blobpulse:latest \
            -t ghcr.io/${{ github.repository_owner }}/blobpulse:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/blobpulse:latest
          docker push ghcr.io/${{ github.repository_owner }}/blobpulse:${{ github.sha }}

      - name: Image Summary
        run: |
          echo "Published:"
          echo "ghcr.io/${{ github.repository_owner }}/blobpulse:latest"
          echo "ghcr.io/${{ github.repository_owner }}/blobpulse:${{ github.sha }}"
