name: Build and Push Blobpulse Image

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: blobpulse

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Convert repository owner to lowercase
        id: owner
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ steps.owner.outputs.owner }}/blobpulse:latest \
            -t ghcr.io/${{ steps.owner.outputs.owner }}/blobpulse:${{ github.sha }} \
            .

      - name: Push latest tag
        run: docker push ghcr.io/${{ steps.owner.outputs.owner }}/blobpulse:latest

      - name: Push version tag
        run: docker push ghcr.io/${{ steps.owner.outputs.owner }}/blobpulse:${{ github.sha }}
