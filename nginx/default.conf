server {
    listen 3000;

    # Where your Next.js static files live inside the container
    root /var/www/html;
    
    # Global fallbacks
    index index.html index.htm;

    # 1. Next.js Static UI Routing Fix
    location / {
        # Check for direct file, then file.html, then directory, then fall back to index.html
        try_files $uri $uri.html $uri/ /index.html;
    }

    # 2. .NET API Reverse Proxy
    location /api/ {
        # Explicit loopback IP without a trailing slash to keep /api/blob paths intact
        proxy_pass http://127.0.0.1:${API_PORT};
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}